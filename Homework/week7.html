    <div class="header">
        <h1>Week 9 Assignment</h1>
        <h2>JSON</h2>
        <p>For this weeks fluency evidence, I am showing my fluency in JSOn and Ajax.</p>

        <div>
            <label for="name">Fruit Name</label>
            <input type="text" id="fruitname"><br><br>
            <label for="color">Fruit Color</label>
            <input type="text" id="fruitcolor"><br><br>
            <label for="type">Fruit Type</label>
            <input type="text" id="fruittype"><br><br>

            <button id="demo">Stringify</button><br><br>
        </div>


        <textarea rows="8" cols="100" id="object">
        </textarea>



        <script>
            var jsObj = new Object();

            document.getElementById("demo").addEventListener("click", myFunction0);

            function myFunction0() {
                jsObj.name = document.getElementById("fruitname").value;
                jsObj.color = document.getElementById("fruitcolor").value;
                jsObj.type = document.getElementById("fruittype").value;


                document.getElementById("object").innerHTML = JSON.stringify(jsObj);
            }

        </script>
    </div>

    <script src="../js/myScript.js"></script>
